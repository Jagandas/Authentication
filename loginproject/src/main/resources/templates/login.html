<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glass Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* Background */
body {
    height: 100vh;
    background: url('assets/loginbackground.jpg') no-repeat center;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass Container */
.container {
    width: 350px;
    padding: 40px 30px;
    border-radius: 15px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.3);
    text-align: center;
    color: #fff;
}

/* Title */
.container h2 {
    margin-bottom: 30px;
    font-weight: 600;
}

/* Input Box */
.input-box {
    position: relative;
    margin-bottom: 25px;
}

.input-box input {
    width: 100%;
    padding: 10px 5px;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    border-bottom: 2px solid rgba(255,255,255,0.6);
    font-size: 14px;
}

.input-box label {
    position: absolute;
    left: 5px;
    top: 10px;
    color: #ddd;
    font-size: 14px;
    pointer-events: none;
    transition: 0.3s;
}

/* Floating label */
.input-box input:focus ~ label,
.input-box input:valid ~ label {
    top: -10px;
    font-size: 12px;
    color: #fff;
}

/* Options */
.options {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 20px;
}

.options a {
    color: #fff;
    text-decoration: none;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    border-radius: 25px;
    border: none;
    background: #fff;
    color: #333;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ddd;
}

/* Register text */
.register {
    margin-top: 15px;
    font-size: 13px;
}

.register a {
    color: #fff;
    text-decoration: none;
    font-weight: bold;
}
</style>

</head>
<body>
	
<div class="container">
    <h2>Login</h2>
	
    <form action="/login" method="post">

        <div class="input-box">
            <input type="text" name="username" required>
            <label>Email</label>
        </div>

        <div class="input-box">
            <input type="password" name="password" required>
            <label>Password</label>
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember Me</label>
            <a href="#">Forgot Password</a>
        </div>

        <button type="submit">Log in</button>

        <div class="register">
            Don't have an account? <a href="/register">Register</a>
        </div>

    </form>
</div>

</body>
</html>
