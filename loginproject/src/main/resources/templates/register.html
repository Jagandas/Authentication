<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* Background (use your assets image) */
body {
    height: 100vh;
    background: url('/assets/loginbackground.jpg') no-repeat center;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass Container */
.container {
    width: 350px;
    padding: 40px 30px;
    border-radius: 15px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.3);
    text-align: center;
    color: #fff;
}

/* Title */
.container h2 {
    margin-bottom: 30px;
}

/* Input Box */
.input-box {
    position: relative;
    margin-bottom: 25px;
}

.input-box input {
    width: 100%;
    padding: 10px 5px;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    border-bottom: 2px solid rgba(255,255,255,0.6);
}

.input-box label {
    position: absolute;
    left: 5px;
    top: 10px;
    color: #ddd;
    transition: 0.3s;
    pointer-events: none;
}

/* Floating effect */
.input-box input:focus ~ label,
.input-box input:valid ~ label {
    top: -10px;
    font-size: 12px;
    color: #fff;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    border-radius: 25px;
    border: none;
    background: #fff;
    color: #333;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ddd;
}

/* Bottom link */
.login-link {
    margin-top: 15px;
    font-size: 13px;
}

.login-link a {
    color: #fff;
    text-decoration: none;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
    <h2>Register</h2>

    <form action="/register" method="post">

        <div class="input-box">
            <input type="text" name="username" required>
            <label>Username</label>
        </div>

        <div class="input-box">
            <input type="email" name="email" required>
            <label>Email</label>
        </div>

        <div class="input-box">
            <input type="password" name="password" required>
            <label>Password</label>
        </div>

        <div class="input-box">
            <input type="password" name="confirmPassword" required>
            <label>Confirm Password</label>
        </div>

        <button type="submit">Register</button>

        <div class="login-link">
            Already have an account? <a href="/login">Login</a>
        </div>

    </form>
</div>

</body>
</html>
